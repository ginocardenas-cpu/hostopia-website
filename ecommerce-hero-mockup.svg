<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <!-- Gradient overlays -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8eef3"/>
      <stop offset="50%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e4ecf2"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a882"/>
      <stop offset="100%" stop-color="#b89b74"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0f8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0f8ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="tabletClip">
      <rect x="390" y="115" width="340" height="230" rx="4"/>
    </clipPath>
    <clipPath id="monitorClip">
      <rect x="710" y="80" width="380" height="240" rx="2"/>
    </clipPath>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  <!-- Subtle warm office wall -->
  <rect x="0" y="0" width="1200" height="420" fill="#eae6df" opacity="0.3"/>
  <!-- Window light suggestion -->
  <rect x="50" y="30" width="200" height="300" rx="4" fill="#fff" opacity="0.15"/>
  <rect x="60" y="40" width="85" height="135" rx="2" fill="#d5e8f0" opacity="0.2"/>
  <rect x="155" y="40" width="85" height="135" rx="2" fill="#d5e8f0" opacity="0.2"/>
  <rect x="60" y="185" width="85" height="135" rx="2" fill="#c8dce6" opacity="0.15"/>
  <rect x="155" y="185" width="85" height="135" rx="2" fill="#c8dce6" opacity="0.15"/>

  <!-- === DESK SURFACE === -->
  <rect x="0" y="420" width="1200" height="255" fill="url(#deskGrad)"/>
  <rect x="0" y="420" width="1200" height="2" fill="#d4b896" opacity="0.5"/>

  <!-- Small plant on desk -->
  <rect x="95" y="380" width="30" height="40" rx="4" fill="#8B7355"/>
  <circle cx="110" cy="368" r="22" fill="#5a8a5e"/>
  <circle cx="98" cy="372" r="16" fill="#4e7a52"/>
  <circle cx="120" cy="375" r="14" fill="#6b9a6e"/>

  <!-- Coffee mug -->
  <rect x="300" y="405" width="35" height="40" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <ellipse cx="317" cy="405" rx="17.5" ry="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="317" cy="410" rx="12" ry="3" fill="#6F4E37" opacity="0.8"/>
  <path d="M335 415 Q348 418 348 428 Q348 438 335 440" fill="none" stroke="#ddd" stroke-width="1.5"/>
  <!-- Steam -->
  <path d="M310 398 Q308 388 312 380" fill="none" stroke="#ccc" stroke-width="1" opacity="0.4"/>
  <path d="M320 396 Q322 384 318 376" fill="none" stroke="#ccc" stroke-width="1" opacity="0.3"/>


  <!-- ===================================================== -->
  <!-- === LAYER 1: SERVICE PROVIDER (FOREGROUND / HERO) === -->
  <!-- ===================================================== -->

  <!-- Person — Service Provider Professional (left-center) -->
  <!-- Body / Torso — navy blazer -->
  <path d="M140 675 L140 480 Q140 440 180 430 L220 420 Q240 415 260 420 L300 430 Q340 440 340 480 L340 675 Z" fill="#2c3e5e"/>
  <!-- Shirt collar -->
  <path d="M210 420 L230 445 L250 420" fill="none" stroke="#e8e8e8" stroke-width="2"/>
  <path d="M215 420 L230 440 L245 420" fill="#fff"/>
  <!-- Neck -->
  <rect x="218" y="385" width="44" height="40" rx="6" fill="#d4a574"/>
  <!-- Head -->
  <ellipse cx="240" cy="355" rx="48" ry="55" fill="#d4a574"/>
  <!-- Hair -->
  <path d="M195 340 Q195 290 240 285 Q285 290 285 340 Q285 320 270 310 Q250 300 230 300 Q210 300 200 315 Q195 325 195 340Z" fill="#3a2a1a"/>
  <!-- Ear -->
  <ellipse cx="195" cy="355" rx="8" ry="12" fill="#c4956a"/>
  <!-- Eyes -->
  <ellipse cx="222" cy="348" rx="5" ry="4" fill="#2c1810"/>
  <ellipse cx="258" cy="348" rx="5" ry="4" fill="#2c1810"/>
  <circle cx="224" cy="347" r="1.5" fill="#fff"/>
  <circle cx="260" cy="347" r="1.5" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M214 340 Q222 336 230 339" fill="none" stroke="#3a2a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M250 339 Q258 336 266 340" fill="none" stroke="#3a2a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M240 352 Q237 362 234 366 Q238 368 243 368 Q247 366 244 362Z" fill="#c4956a"/>
  <!-- Mouth — slight smile -->
  <path d="M228 378 Q240 386 252 378" fill="none" stroke="#a0705a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right arm pointing toward tablet -->
  <path d="M300 440 Q340 445 360 435 Q380 425 385 400" fill="none" stroke="#2c3e5e" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hand pointing -->
  <circle cx="388" cy="395" r="14" fill="#d4a574"/>
  <path d="M395 388 L420 380" stroke="#d4a574" stroke-width="6" stroke-linecap="round"/>

  <!-- Left arm on desk -->
  <path d="M140 460 Q120 470 115 490 Q112 510 120 530" fill="none" stroke="#2c3e5e" stroke-width="24" stroke-linecap="round"/>
  <circle cx="120" cy="535" r="12" fill="#d4a574"/>


  <!-- ================================================ -->
  <!-- === LAYER 2: TABLET SHOWING ECOMMERCE STORE === -->
  <!-- ================================================ -->

  <!-- Tablet device -->
  <g filter="url(#shadow)">
    <rect x="375" y="100" width="370" height="260" rx="14" fill="#1a1a1a"/>
    <rect x="390" y="115" width="340" height="230" rx="4" fill="#fff"/>
  </g>

  <!-- Store content inside tablet -->
  <g clip-path="url(#tabletClip)">
    <!-- Store header bar -->
    <rect x="390" y="115" width="340" height="32" fill="#24282B"/>
    <text x="410" y="136" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">🛒 mypartnerstore.com</text>
    <rect x="660" y="124" width="50" height="16" rx="8" fill="#F8CF41"/>
    <text x="670" y="136" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#24282B">Cart (3)</text>

    <!-- Banner area -->
    <rect x="390" y="147" width="340" height="55" fill="#f0f7f7"/>
    <text x="420" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#24282B">Spring Collection</text>
    <text x="420" y="185" font-family="Arial, sans-serif" font-size="9" fill="#555">New arrivals — up to 30% off selected items</text>
    <rect x="620" y="155" width="90" height="38" rx="6" fill="#2CADB2" opacity="0.15"/>
    <text x="640" y="178" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#2CADB2">Shop Now →</text>

    <!-- Product grid -->
    <!-- Product 1 -->
    <rect x="400" y="212" width="100" height="70" rx="6" fill="#f5f0eb"/>
    <rect x="415" y="222" width="70" height="35" rx="4" fill="#e0d5c8"/>
    <circle cx="450" cy="240" r="10" fill="#c4a882" opacity="0.6"/>
    <text x="410" y="272" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#24282B">Leather Tote</text>
    <text x="410" y="281" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#2CADB2">$89.00</text>

    <!-- Product 2 -->
    <rect x="510" y="212" width="100" height="70" rx="6" fill="#eef0f5"/>
    <rect x="525" y="222" width="70" height="35" rx="4" fill="#d5dae5"/>
    <rect x="545" y="228" width="30" height="25" rx="2" fill="#a8b5cc" opacity="0.6"/>
    <text x="520" y="272" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#24282B">Denim Jacket</text>
    <text x="520" y="281" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#2CADB2">$129.00</text>

    <!-- Product 3 -->
    <rect x="620" y="212" width="100" height="70" rx="6" fill="#f0ede8"/>
    <rect x="635" y="222" width="70" height="35" rx="4" fill="#ddd5c8"/>
    <circle cx="670" cy="237" r="8" fill="#c8b898" opacity="0.6"/>
    <text x="630" y="272" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#24282B">Canvas Sneaker</text>
    <text x="630" y="281" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#2CADB2">$65.00</text>

    <!-- Product row 2 -->
    <rect x="400" y="295" width="100" height="50" rx="6" fill="#f2eff5"/>
    <rect x="415" y="302" width="70" height="25" rx="4" fill="#ddd5e5"/>
    <text x="410" y="342" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#24282B">Silk Scarf</text>

    <rect x="510" y="295" width="100" height="50" rx="6" fill="#edf5f0"/>
    <rect x="525" y="302" width="70" height="25" rx="4" fill="#d0e5d8"/>
    <text x="520" y="342" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#24282B">Wool Beanie</text>

    <rect x="620" y="295" width="100" height="50" rx="6" fill="#f5f2ed"/>
    <rect x="635" y="302" width="70" height="25" rx="4" fill="#e5ddd0"/>
    <text x="630" y="342" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#24282B">Watch Strap</text>
  </g>


  <!-- ========================================================= -->
  <!-- === BACKGROUND MONITOR SHOWING PARTNER DASHBOARD       === -->
  <!-- ========================================================= -->

  <g filter="url(#shadow)" opacity="0.85">
    <!-- Monitor frame -->
    <rect x="695" y="65" width="410" height="270" rx="10" fill="#222"/>
    <rect x="710" y="80" width="380" height="240" rx="2" fill="#1a2332"/>
    <!-- Monitor stand -->
    <rect x="870" y="335" width="70" height="20" rx="2" fill="#333"/>
    <rect x="850" y="355" width="110" height="8" rx="4" fill="#2a2a2a"/>
  </g>

  <!-- Dashboard content -->
  <g clip-path="url(#monitorClip)">
    <rect x="710" y="80" width="380" height="240" fill="#1a2332"/>

    <!-- Dashboard header -->
    <rect x="710" y="80" width="380" height="30" fill="#162035"/>
    <circle cx="728" cy="95" r="5" fill="#2CADB2"/>
    <text x="740" y="99" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#8aa4c8">Partner Dashboard</text>
    <text x="1000" y="99" font-family="Arial, sans-serif" font-size="8" fill="#5a7a9a">Live</text>
    <circle cx="1020" cy="95" r="3" fill="#27ae60"/>

    <!-- Revenue stat cards row -->
    <!-- Card 1: Monthly Revenue -->
    <rect x="720" y="118" width="115" height="50" rx="6" fill="#1e2d42"/>
    <text x="730" y="134" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a" text-transform="uppercase">MONTHLY REVENUE</text>
    <text x="730" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2CADB2">$284K</text>
    <text x="800" y="155" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">▲ 18%</text>

    <!-- Card 2: Active SMBs -->
    <rect x="843" y="118" width="115" height="50" rx="6" fill="#1e2d42"/>
    <text x="853" y="134" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">ACTIVE SMB CUSTOMERS</text>
    <text x="853" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#F8CF41">12,847</text>

    <!-- Card 3: ARPU -->
    <rect x="966" y="118" width="115" height="50" rx="6" fill="#1e2d42"/>
    <text x="976" y="134" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">AVG ARPU</text>
    <text x="976" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#fff">$22.10</text>
    <text x="1035" y="155" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">▲ 8%</text>

    <!-- Chart area -->
    <rect x="720" y="178" width="238" height="130" rx="6" fill="#1e2d42"/>
    <text x="730" y="195" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#8aa4c8">Revenue by Product</text>
    <!-- Bar chart -->
    <rect x="740" y="260" width="30" height="38" rx="2" fill="#2CADB2"/>
    <text x="745" y="255" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">Email</text>
    <rect x="780" y="240" width="30" height="58" rx="2" fill="#2CADB2" opacity="0.8"/>
    <text x="783" y="235" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">Web</text>
    <rect x="820" y="220" width="30" height="78" rx="2" fill="#F8CF41"/>
    <text x="823" y="215" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">eCom</text>
    <rect x="860" y="268" width="30" height="30" rx="2" fill="#2CADB2" opacity="0.6"/>
    <text x="865" y="263" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">SEO</text>
    <rect x="900" y="275" width="30" height="23" rx="2" fill="#2CADB2" opacity="0.4"/>
    <text x="905" y="270" font-family="Arial, sans-serif" font-size="7" fill="#5a7a9a">SSL</text>
    <!-- Chart baseline -->
    <line x1="735" y1="298" x2="940" y2="298" stroke="#2a3d55" stroke-width="1"/>

    <!-- Services list panel -->
    <rect x="966" y="178" width="115" height="130" rx="6" fill="#1e2d42"/>
    <text x="976" y="195" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#8aa4c8">Top Services</text>
    <!-- List items -->
    <circle cx="982" cy="213" r="3" fill="#2CADB2"/>
    <text x="990" y="216" font-family="Arial, sans-serif" font-size="8" fill="#ccd8e8">Business Email</text>
    <circle cx="982" cy="230" r="3" fill="#F8CF41"/>
    <text x="990" y="233" font-family="Arial, sans-serif" font-size="8" fill="#ccd8e8">Online Store</text>
    <circle cx="982" cy="247" r="3" fill="#2CADB2" opacity="0.7"/>
    <text x="990" y="250" font-family="Arial, sans-serif" font-size="8" fill="#ccd8e8">Website Builder</text>
    <circle cx="982" cy="264" r="3" fill="#2CADB2" opacity="0.5"/>
    <text x="990" y="267" font-family="Arial, sans-serif" font-size="8" fill="#ccd8e8">Directory Listings</text>
    <circle cx="982" cy="281" r="3" fill="#2CADB2" opacity="0.3"/>
    <text x="990" y="284" font-family="Arial, sans-serif" font-size="8" fill="#ccd8e8">SSL Certificates</text>
    <circle cx="982" cy="298" r="3" fill="#2CADB2" opacity="0.2"/>
    <text x="990" y="301" font-family="Arial, sans-serif" font-size="8" fill="#ccd8e8">SEO Services</text>
  </g>


  <!-- ========================================== -->
  <!-- === LAYER 1: SMB CUSTOMER (SECONDARY)  === -->
  <!-- ========================================== -->

  <!-- Person — SMB Owner (right side, slightly smaller / softer) -->
  <!-- Body — casual blazer, lighter tone -->
  <path d="M900 675 L900 510 Q900 470 940 460 L960 455 Q980 450 1000 455 L1020 460 Q1060 470 1060 510 L1060 675 Z" fill="#5a7a6e"/>
  <!-- Shirt -->
  <path d="M960 455 L975 475 L990 455" fill="#fff"/>
  <!-- Neck -->
  <rect x="963" y="420" width="35" height="38" rx="5" fill="#a0754a"/>
  <!-- Head -->
  <ellipse cx="980" cy="393" rx="40" ry="46" fill="#a0754a"/>
  <!-- Hair — shorter, darker -->
  <path d="M943 380 Q943 342 980 335 Q1017 342 1017 380 Q1015 365 1005 358 Q990 350 970 350 Q955 352 948 365 Q943 372 943 380Z" fill="#1a1208"/>
  <!-- Ear -->
  <ellipse cx="1018" cy="393" rx="7" ry="10" fill="#8c6540"/>
  <!-- Eyes — looking at tablet -->
  <ellipse cx="968" cy="388" rx="4" ry="3.5" fill="#1a1208"/>
  <ellipse cx="992" cy="388" rx="4" ry="3.5" fill="#1a1208"/>
  <circle cx="967" cy="387" r="1.2" fill="#fff"/>
  <circle cx="991" cy="387" r="1.2" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M960 381 Q968 378 975 380" fill="none" stroke="#1a1208" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M985 380 Q992 378 1000 381" fill="none" stroke="#1a1208" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M980 392 Q978 400 975 403 Q978 405 982 405 Q985 403 983 400Z" fill="#8c6540"/>
  <!-- Mouth — engaged smile -->
  <path d="M970 415 Q980 421 990 415" fill="none" stroke="#7a5a3a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Left arm on desk, relaxed -->
  <path d="M900 480 Q870 500 865 530" fill="none" stroke="#5a7a6e" stroke-width="20" stroke-linecap="round"/>
  <circle cx="863" cy="535" r="10" fill="#a0754a"/>


  <!-- ============================== -->
  <!-- === ANNOTATION LAYER       === -->
  <!-- ============================== -->

  <!-- Layer labels -->
  <!-- Layer 1 label -->
  <rect x="24" y="598" width="260" height="56" rx="10" fill="#24282B" opacity="0.92"/>
  <text x="44" y="620" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#2CADB2" letter-spacing="0.08em">LAYER 1 — FOREGROUND</text>
  <text x="44" y="638" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#fff">Service Provider (The Hero)</text>

  <!-- Layer 2 label -->
  <rect x="420" y="368" width="290" height="56" rx="10" fill="#24282B" opacity="0.92"/>
  <text x="440" y="390" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#F8CF41" letter-spacing="0.08em">LAYER 2 — ON SCREEN</text>
  <text x="440" y="408" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#fff">SMB Online Store + Partner Dashboard</text>

  <!-- Layer 3 label -->
  <rect x="815" y="460" width="260" height="56" rx="10" fill="#24282B" opacity="0.92"/>
  <text x="835" y="482" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="0.08em">LAYER 3 — IMPLIED</text>
  <text x="835" y="500" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#fff">Hostopia (Never shown directly)</text>

  <!-- Connector lines -->
  <line x1="284" y1="598" x2="240" y2="480" stroke="#2CADB2" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
  <line x1="560" y1="368" x2="560" y2="345" stroke="#F8CF41" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
  <line x1="945" y1="460" x2="980" y2="440" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

</svg>
